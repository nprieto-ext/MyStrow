name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # BUILD WINDOWS (exe + installer Inno Setup)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Fetch fixtures Firestore
        env:
          FIREBASE_ADMIN_EMAIL: ${{ secrets.FIREBASE_ADMIN_EMAIL }}
          FIREBASE_ADMIN_PASSWORD: ${{ secrets.FIREBASE_ADMIN_PASSWORD }}
        shell: pwsh
        run: |
          @'
          import os, gzip, json, sys
          sys.path.insert(0, ".")
          email = os.environ.get("FIREBASE_ADMIN_EMAIL", "")
          password = os.environ.get("FIREBASE_ADMIN_PASSWORD", "")
          out = "fixtures_bundle_custom.json.gz"
          def write_bundle(data):
              with gzip.open(out, "wb") as f:
                  f.write(json.dumps(data, ensure_ascii=False).encode("utf-8"))
          if not email or not password:
              print("Secrets Firebase absents - bundle vide")
              write_bundle([])
          else:
              try:
                  import firebase_client as fc
                  result = fc.sign_in(email, password)
                  token = result["id_token"]
                  fixtures = fc.fetch_all_gdtf_fixtures(token)
                  clean = [{k:v for k,v in fx.items() if not k.startswith("_")} for fx in fixtures]
                  write_bundle(clean)
                  print(str(len(clean)) + " fixtures embarquees")
              except Exception as e:
                  print("Erreur fetch fixtures: " + str(e) + " - bundle vide")
                  write_bundle([])
          '@ | Out-File -FilePath _fetch_fixtures.py -Encoding utf8
          python _fetch_fixtures.py
          Remove-Item _fetch_fixtures.py

      - name: Build EXE
        run: pyinstaller --onedir --windowed --icon=mystrow.ico --add-data "logo.png;." --add-data "mystrow.ico;." --add-data "fixtures_bundle_custom.json.gz;." --add-data "fixtures_qlcplus.json;." --paths=. --collect-all=rtmidi --hidden-import=rtmidi._rtmidi --hidden-import=miniaudio --collect-all=serial --hidden-import=serial.tools.list_ports --noupx --noconfirm main.py --name MyStrow

      - name: Generate SHA256 and .sig
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist\MyStrow -Filter MyStrow.exe -Recurse | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  MyStrow.exe" | Out-File -Encoding ascii dist\sha256.txt
          Write-Host "SHA256: $hash"
          python _gen_sig.py $exe.FullName

      - name: Build Installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\maestro.iss
        shell: pwsh

      - name: Collect artifacts (dossier plat)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "installer\installer_output\MyStrow_Setup.exe" "artifacts\"
          $exe = Get-ChildItem -Path dist\MyStrow -Filter MyStrow.exe -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName "artifacts\"
          $sig = Get-ChildItem -Path dist\MyStrow -Filter "*.sig" -Recurse | Select-Object -First 1
          if ($sig) { Copy-Item $sig.FullName "artifacts\" }
          Copy-Item "dist\sha256.txt" "artifacts\"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

  # ─────────────────────────────────────────────
  # BUILD MAC — binaire arm64 (M-series natif + Rosetta sur Intel)
  # Runner macos-15 (Sequoia) : SDK plus récent → meilleure compat macOS 26 Tahoe
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-15    # SDK macOS 15 — bootloader PyInstaller plus compatible Tahoe
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      dmg_uploaded: ${{ steps.upload-dmg.outputs.dmg_uploaded }}
    steps:
      - uses: actions/checkout@v4

      # Python.org fournit un vrai Python.framework (/Library/Frameworks/Python.framework/)
      # contrairement à actions/setup-python qui installe un Python standalone sans framework.
      # PyInstaller requiert Python.framework pour construire un .app bundle correct sur macOS :
      # sans framework, le bootloader ne trouve pas _internal/ à côté de l'exécutable et
      # retombe en mode onefile → cherche dans $TMPDIR/_MEI... → crash sur macOS 26 Tahoe.
      - name: Install Python.org Python 3.12 (framework build)
        run: |
          PY_VER="3.12.7"
          curl -fsSL "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-macos11.pkg" -o /tmp/python_fw.pkg
          sudo installer -pkg /tmp/python_fw.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> $GITHUB_PATH
          /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 --version

      - name: Install dependencies
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          python3.12 -m pip install --upgrade pip --quiet
          python3.12 -m pip install -r requirements.txt --quiet
          # --no-binary pyinstaller compile le bootloader C nativement sur le runner
          # (macOS 15 SDK) pour maximiser la compatibilité macOS 26 Tahoe
          python3.12 -m pip install pyinstaller --no-binary pyinstaller --upgrade --no-cache-dir --quiet

      - name: Convert logo.png → mystrow.icns (sips — sans pillow)
        run: |
          mkdir -p mystrow.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size logo.png --out "mystrow.iconset/icon_${size}x${size}.png" > /dev/null
            sips -z $((size*2)) $((size*2)) logo.png --out "mystrow.iconset/icon_${size}x${size}@2x.png" > /dev/null
          done
          iconutil -c icns mystrow.iconset -o mystrow.icns

      - name: Build .app (arm64 — Apple Silicon natif)
        run: python3.12 -m PyInstaller --noconfirm MyStrow.spec

      - name: Verify bundle structure
        run: |
          echo "=== Contents/ ==="
          ls -la "dist/MyStrow.app/Contents/"
          echo "=== Contents/MacOS/ ==="
          ls -la "dist/MyStrow.app/Contents/MacOS/"
          echo "=== Contents/Frameworks/ (top-level) ==="
          ls "dist/MyStrow.app/Contents/Frameworks/" 2>/dev/null | head -30 || echo "(vide)"
          echo "=== Contents/Resources/ (top-level) ==="
          ls "dist/MyStrow.app/Contents/Resources/" 2>/dev/null | head -30 || echo "(vide)"
          echo ""
          BUNDLE_OK=0
          # Mode standalone Python : _internal/ adjacent à l'exécutable
          if [ -d "dist/MyStrow.app/Contents/MacOS/_internal" ]; then
            echo "✅ Mode standalone : _internal/ trouvé"
            BUNDLE_OK=1
          fi
          # Mode Python.framework (Python.org) : framework dans Contents/Frameworks/
          if [ -f "dist/MyStrow.app/Contents/Frameworks/Python.framework/Versions/3.12/Python" ]; then
            echo "✅ Mode framework : Python.framework/Versions/3.12/Python trouvé"
            BUNDLE_OK=1
          fi
          [ "$BUNDLE_OK" = "1" ] || { echo "❌ Bundle cassé : ni _internal/ ni Python.framework"; exit 1; }
          echo ""
          echo "=== Qt/PySide6 check ==="
          QT=$(find "dist/MyStrow.app" -name "QtCore*" 2>/dev/null | head -3)
          if [ -n "$QT" ]; then
            echo "✅ Qt trouvé : $QT"
          else
            echo "⚠️  QtCore non trouvé — PySide6 absent du bundle!"
            exit 1
          fi

      - name: Check signing secrets availability
        id: check-secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
        run: |
          [ -n "$MACOS_CERTIFICATE" ]    && echo "has_cert=true"         >> $GITHUB_OUTPUT || echo "has_cert=false"         >> $GITHUB_OUTPUT
          [ -n "$NOTARIZATION_APPLE_ID" ] && echo "has_notarization=true" >> $GITHUB_OUTPUT || echo "has_notarization=false" >> $GITHUB_OUTPUT

      - name: Import certificat de signature
        if: steps.check-secrets.outputs.has_cert == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | tr -d '\r\n' | base64 -D > certificate.p12
          security create-keychain -p mystrow-ci temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security unlock-keychain -p mystrow-ci temp.keychain
          security import certificate.p12 -k temp.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s temp.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s temp.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k mystrow-ci temp.keychain

      - name: Signer .app (inside-out — sans --deep)
        if: steps.check-secrets.outputs.has_cert == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          # Inside-out : signer tous les Mach-O avant le bundle
          # --deep signe dans le désordre et peut casser les @rpath PyInstaller 6.x
          # On utilise `file` pour détecter tous les Mach-O (pas juste .dylib/.so)
          find dist/MyStrow.app -type f | while read f; do
            FTYPE=$(file "$f" 2>/dev/null)
            if echo "$FTYPE" | grep -qE "Mach-O.*executable"; then
              # Exécutables : hardened runtime requis
              codesign --sign "$IDENTITY" --force --options runtime "$f" 2>/dev/null || true
            elif echo "$FTYPE" | grep -qE "Mach-O"; then
              # Dylibs / bundles .so : signature simple
              codesign --sign "$IDENTITY" --force "$f" 2>/dev/null || true
            fi
          done
          # Signer le bundle en dernier (sans --deep — déjà fait ci-dessus)
          codesign --force --verify --verbose \
            --sign "$IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist \
            dist/MyStrow.app

      - name: Notariser
        if: steps.check-secrets.outputs.has_notarization == 'true'
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_APPLE_PASSWORD: ${{ secrets.NOTARIZATION_APPLE_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/MyStrow.app MyStrow_notarize.zip
          NOTARY_JSON=$(xcrun notarytool submit MyStrow_notarize.zip \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_APPLE_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait --output-format json)
          echo "$NOTARY_JSON"
          SUBMISSION_ID=$(echo "$NOTARY_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$NOTARY_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" = "Accepted" ]; then
            xcrun stapler staple dist/MyStrow.app
          else
            echo "=== NOTARIZATION REJECTED — LOG DÉTAILLÉ ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_APPLE_PASSWORD" \
              --team-id "$NOTARIZATION_TEAM_ID"
            exit 1
          fi

      - name: Créer DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MyStrow" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MyStrow.app" 150 190 \
            --app-drop-link 450 190 \
            "MyStrow_Installer.dmg" \
            "dist/"

      - name: Signer le DMG
        if: steps.check-secrets.outputs.has_cert == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          codesign --sign "$IDENTITY" MyStrow_Installer.dmg

      - name: Upload Mac DMG
        id: upload-dmg
        run: echo "dmg_uploaded=true" >> $GITHUB_OUTPUT

      - name: Upload Mac DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: MyStrow_Installer.dmg

  # ─────────────────────────────────────────────
  # CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer/

      - name: Download Mac DMG (optionnel)
        if: needs.build-mac.outputs.dmg_uploaded == 'true'
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: mac-dmg/

      - name: Build release notes
        id: notes
        env:
          DMG_AVAILABLE: ${{ needs.build-mac.outputs.dmg_uploaded }}
        run: |
          {
            echo 'body<<NOTES_EOF'
            echo "Release ${{ github.ref_name }}"
            echo ""
            echo "**Téléchargements :**"
            echo "- 🪟 Windows : \`MyStrow_Setup.exe\`"
            [ "$DMG_AVAILABLE" = "true" ] && echo "- 🍎 Mac (Intel + Apple Silicon) : \`MyStrow_Installer.dmg\`"
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "MyStrow ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: false
          files: |
            windows-installer/MyStrow_Setup.exe
            windows-installer/MyStrow.exe
            windows-installer/MyStrow.exe.sig
            windows-installer/sha256.txt
            mac-dmg/MyStrow_Installer.dmg

      - name: Supprimer les anciennes releases (garder 1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          CURRENT_VER="${CURRENT_TAG#v}"
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName --jq '.[].tagName' | \
          while read tag; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              TAG_VER="${tag#v}"
              OLDEST=$(printf "%s\n%s" "$TAG_VER" "$CURRENT_VER" | sort -V | head -1)
              if [ "$OLDEST" = "$TAG_VER" ]; then
                echo "Suppression de la release $tag..."
                gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag
              fi
            fi
          done
