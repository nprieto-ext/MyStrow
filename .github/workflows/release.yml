name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # BUILD WINDOWS (exe + installer Inno Setup)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --icon=mystrow.ico --add-data "logo.png;." --add-data "mystrow.ico;." --paths=. --collect-all=rtmidi --hidden-import=rtmidi._rtmidi --hidden-import=miniaudio --noupx --noconfirm main.py --name MyStrow

      - name: Generate SHA256 and .sig
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\MyStrow.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  MyStrow.exe" | Out-File -Encoding ascii dist\sha256.txt
          Write-Host "SHA256: $hash"
          python _gen_sig.py dist/MyStrow.exe

      - name: Build Installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\maestro.iss
        shell: pwsh

      - name: Collect artifacts (dossier plat)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "installer\installer_output\MyStrow_Setup.exe" "artifacts\"
          Copy-Item "dist\MyStrow.exe" "artifacts\"
          Copy-Item "dist\MyStrow.exe.sig" "artifacts\"
          Copy-Item "dist\sha256.txt" "artifacts\"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

  # ─────────────────────────────────────────────
  # BUILD MAC (.app + DMG signé + notarisé)
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    continue-on-error: true  # Ne bloque pas la release Windows si le build Mac échoue
    outputs:
      dmg_uploaded: ${{ steps.upload-dmg.outputs.dmg_uploaded }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert logo.png → mystrow.icns
        run: |
          mkdir -p mystrow.iconset
          python3 - <<'EOF'
          from PIL import Image
          sizes = [16,32,64,128,256,512]
          img = Image.open("logo.png").convert("RGBA")
          import os; os.makedirs("mystrow.iconset", exist_ok=True)
          for s in sizes:
              img.resize((s,s), Image.LANCZOS).save(f"mystrow.iconset/icon_{s}x{s}.png")
              img.resize((s*2,s*2), Image.LANCZOS).save(f"mystrow.iconset/icon_{s}x{s}@2x.png")
          EOF
          iconutil -c icns mystrow.iconset -o mystrow.icns

      - name: Build .app
        run: |
          pyinstaller \
            --windowed \
            --icon=mystrow.icns \
            --add-data "logo.png:." \
            --add-data "mystrow.icns:." \
            --name MyStrow \
            --paths=. \
            --collect-all rtmidi \
            --hidden-import=rtmidi \
            --hidden-import=rtmidi._rtmidi \
            --hidden-import=node_connection \
            --hidden-import=brad_diagnostic \
            --hidden-import=artnet_dmx \
            --hidden-import=firebase_config \
            --noupx \
            --noconfirm \
            main.py

      - name: Check signing secrets availability
        id: check-secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            echo "has_cert=true" >> $GITHUB_OUTPUT
          else
            echo "has_cert=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$NOTARIZATION_APPLE_ID" ]; then
            echo "has_notarization=true" >> $GITHUB_OUTPUT
          else
            echo "has_notarization=false" >> $GITHUB_OUTPUT
          fi

      - name: Import certificat de signature
        if: steps.check-secrets.outputs.has_cert == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | tr -d '\r\n' | base64 -D > certificate.p12
          security create-keychain -p mystrow-ci temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security unlock-keychain -p mystrow-ci temp.keychain
          security import certificate.p12 -k temp.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s temp.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s temp.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k mystrow-ci temp.keychain

      - name: Debug identités disponibles
        if: steps.check-secrets.outputs.has_cert == 'true'
        run: security find-identity -v -p codesigning

      - name: Signer .app
        if: steps.check-secrets.outputs.has_cert == 'true'
        env:
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Identité trouvée : $IDENTITY"
          codesign --deep --force --verify --verbose \
            --sign "$IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist \
            dist/MyStrow.app

      - name: Notariser
        if: steps.check-secrets.outputs.has_notarization == 'true'
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_APPLE_PASSWORD: ${{ secrets.NOTARIZATION_APPLE_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/MyStrow.app MyStrow_notarize.zip
          xcrun notarytool submit MyStrow_notarize.zip \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_APPLE_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait
          xcrun stapler staple dist/MyStrow.app

      - name: Créer DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MyStrow" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MyStrow.app" 150 190 \
            --app-drop-link 450 190 \
            "MyStrow_Installer.dmg" \
            "dist/"

      - name: Signer le DMG
        if: steps.check-secrets.outputs.has_cert == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Identité trouvée : $IDENTITY"
          codesign --sign "$IDENTITY" MyStrow_Installer.dmg

      - name: Upload Mac DMG
        id: upload-dmg
        run: echo "dmg_uploaded=true" >> $GITHUB_OUTPUT

      - name: Upload Mac DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: MyStrow_Installer.dmg

  # ─────────────────────────────────────────────
  # CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac]  # build-mac a continue-on-error, ne bloque pas
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer/

      - name: Download Mac artifacts (optionnel)
        if: needs.build-mac.outputs.dmg_uploaded == 'true'
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: mac-dmg/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MyStrow ${{ github.ref_name }}"
          body: "Release ${{ github.ref_name }}\n\n**Downloads:**\n- Windows: `MyStrow_Setup.exe`\n- Mac: `MyStrow_Installer.dmg` (si disponible)"
          fail_on_unmatched_files: false  # Ignore le DMG s'il n'est pas disponible
          files: |
            windows-installer/MyStrow_Setup.exe
            windows-installer/MyStrow.exe
            windows-installer/MyStrow.exe.sig
            windows-installer/sha256.txt
            mac-dmg/MyStrow_Installer.dmg

      - name: Supprimer les anciennes releases (garder 1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          CURRENT_VER="${CURRENT_TAG#v}"
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName --jq '.[].tagName' | \
          while read tag; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              TAG_VER="${tag#v}"
              # Ne supprimer que si le tag est plus ancien (sort -V place le plus vieux en premier)
              OLDEST=$(printf "%s\n%s" "$TAG_VER" "$CURRENT_VER" | sort -V | head -1)
              if [ "$OLDEST" = "$TAG_VER" ]; then
                echo "Suppression de la release $tag (plus ancienne que $CURRENT_TAG)..."
                gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag
              else
                echo "Conservation de la release $tag (plus recente que $CURRENT_TAG, ignoree)"
              fi
            fi
          done
